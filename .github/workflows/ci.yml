name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  linux-validation:
    name: Linux validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.17"

      - name: Install dependencies
        run: npm ci

      - name: Install CLI dependencies
        run: npm ci
        working-directory: packages/cli

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build app
        run: npm run build

      - name: Build CLI
        run: npm run build:cli

      - name: Verify CLI package provenance metadata
        run: |
          set -euo pipefail
          EXPECTED_VERSION=$(node -p "require('./packages/cli/package.json').version")
          node scripts/release/verify-cli-package-metadata.mjs \
            packages/cli/package.json \
            "$EXPECTED_VERSION" \
            "BehalfID/behalf"

      - name: Focused security and CLI tests
        run: |
          npx vitest run \
            test/cli-hook.test.ts \
            test/approval-intent.test.ts \
            test/approval-request.test.ts \
            test/dashboard-approvals-route.test.ts \
            test/dashboard-inbox-route.test.ts \
            test/ops-approval-ui.test.ts \
            test/verify.test.ts

      - name: Release helper tests
        run: |
          npx vitest run \
            test/verify-cli-artifact.test.ts \
            test/verify-cli-package-metadata.test.ts \
            test/render-homebrew-formula.test.ts \
            test/install-sh.test.ts \
            test/cli-standalone-version.test.ts

      - name: Standalone Linux binary version gate
        run: |
          set -euo pipefail
          chmod +x scripts/release/build-cli-binaries.sh
          scripts/release/build-cli-binaries.sh linux-x64
          EXPECTED=$(node -p "require('./packages/cli/package.json').version")
          ACTUAL=$(./packages/cli/bin/behalf-linux-x64 --version | tr -d '\r')
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "Standalone binary --version was '$ACTUAL', expected '$EXPECTED'"
            exit 1
          fi
          echo "Standalone binary version OK: $ACTUAL"
          TMPDIR_EMPTY=$(mktemp -d)
          cp ./packages/cli/bin/behalf-linux-x64 "$TMPDIR_EMPTY/behalf"
          (
            cd "$TMPDIR_EMPTY"
            EMPTY_ACTUAL=$(./behalf --version | tr -d '\r')
            if [ "$EMPTY_ACTUAL" != "$EXPECTED" ]; then
              echo "Empty-dir binary --version was '$EMPTY_ACTUAL', expected '$EXPECTED'"
              exit 1
            fi
            echo "Empty-dir standalone binary version OK: $EMPTY_ACTUAL"
          )
          rm -rf "$TMPDIR_EMPTY"

  windows-cli:
    name: Windows CLI
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install CLI dependencies
        run: npm ci
        working-directory: packages/cli

      - name: Build CLI
        run: npm run build:cli

      - name: Focused CLI tests
        run: npx vitest run test/cli-hook.test.ts test/approval-intent.test.ts test/verify.test.ts

      - name: CLI version smoke
        run: |
          $expected = (node -p "require('./packages/cli/package.json').version").Trim()
          $out = (node packages/cli/dist/index.js --version).Trim()
          if ($out -ne $expected) {
            Write-Error "Expected CLI version $expected, got '$out'"
            exit 1
          }
          Write-Host "CLI version OK: $out"
